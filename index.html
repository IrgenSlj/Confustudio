<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#4e5f3c" />
  <title>CONFUstudio</title>
  <link rel="icon" href="/public/icon.svg" type="image/svg+xml" />
  <link rel="manifest" href="/public/manifest.webmanifest" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="studio-wrap">
    <div id="studio-canvas">
      <div class="studio-module" id="module-0">
        <main class="chassis">

          <!-- TOP PORTS BAR -->
          <div class="ports-bar">
            <span class="module-drag-handle" title="Drag module">⋮⋮</span>
            <span class="port" data-port="audio-in">Audio In</span>
            <span class="port" data-port="audio-out">Audio Out</span>
            <span class="port" data-port="midi-in">MIDI In</span>
            <span class="port" data-port="midi-out">MIDI Out</span>
            <span class="port" data-port="usb">USB</span>
            <button id="btn-duplicate" class="chassis-dup-btn" title="Duplicate this synth module">⧉</button>
          </div>

          <!-- MAIN GRID: left-col | screen | right-col -->
          <div class="machine-grid">

            <!-- LEFT COLUMN -->
            <aside class="left-col">
              <!-- hidden knob container — keeps JS happy -->
              <div id="left-knobs" style="display:none"></div>

              <!-- SIG meter + VOL fader side by side -->
              <div class="sig-vol-row">
                <!-- Signal meter: 16 vertical LED segments -->
                <div class="meter-section">
                  <div class="meter-label">SIG</div>
                  <div class="signal-meter" id="signal-meter">
                    <!-- 16 spans, JS will light them -->
                    <!-- seg-16 = top/loudest, seg-1 = bottom/quietest -->
                  </div>
                </div>

                <!-- Master volume fader (vertical) -->
                <div class="fader-section">
                  <div class="meter-label">VOL</div>
                  <input type="range" id="master-volume" class="fader-master"
                    orient="vertical" min="0" max="1" step="0.01" value="0.82" title="Master volume" />
                </div>
              </div>

              <!-- Transport buttons -->
              <div class="transport-buttons">
                <button id="btn-audio"  class="t-btn t-btn--audio" title="Initialize audio engine (click first!)">AUDIO</button>
                <button id="btn-play"   class="t-btn t-btn--play" title="Play / Pause (Space)">&#9654;</button>
                <button id="btn-stop"   class="t-btn t-btn--stop" title="Stop and reset playhead">&#9632;</button>
                <button id="btn-record" class="t-btn t-btn--record" title="Record to master output">&#9679;</button>
                <button id="btn-fill"   class="t-btn t-btn--fill" title="Fill mode: play all steps">Fill</button>
                <button id="btn-tap"    class="t-btn" title="Tap tempo">Tap</button>
              </div>

              <!-- BPM edit (moved here from screen-below) -->
              <div id="bpm-edit" class="bpm-edit">
                <button id="bpm-dec" class="bpm-arrow">&#8722;</button>
                <input id="bpm-input" type="number" min="40" max="240" step="0.1" value="122" />
                <button id="bpm-inc" class="bpm-arrow">+</button>
              </div>
            </aside>

            <!-- CENTER: SCREEN -->
            <section class="screen-section">
              <div class="screen-bezel">

                <!-- Top info bar -->
                <div class="screen-topbar">
                  <span id="project-name" class="topbar-item">CONFUstudio</span>
                  <span id="bank-pattern" class="topbar-item">A&#xB7;01</span>
                  <span id="bpm-display"  class="topbar-item topbar-bpm">122 BPM</span>
                  <span id="status-pill"  class="topbar-item topbar-status">IDLE</span>
                </div>

                <!-- 9 page tabs -->
                <nav class="page-tabs" id="page-tabs">
                  <button class="tab active" data-page="pattern">PATTERN</button>
                  <button class="tab" data-page="pad">PADS</button>
                  <button class="tab" data-page="piano-roll">ROLL</button>
                  <button class="tab" data-page="sound">SOUND</button>
                  <button class="tab" data-page="mixer">MIXER</button>
                  <button class="tab" data-page="fx">FX</button>
                  <button class="tab" data-page="modmatrix">MOD</button>
                  <button class="tab" data-page="scenes">SCENES</button>
                  <button class="tab" data-page="banks">BANKS</button>
                  <button class="tab" data-page="arranger">ARR</button>
                  <button class="tab" data-page="settings">SET</button>
                </nav>

                <!-- NO knob-bar here — removed -->

                <!-- Page content area -->
                <div class="page-content" id="page-content">
                  <!-- Rendered by page modules -->
                </div>

                <!-- Oscilloscope strip — always visible -->
                <canvas id="oscilloscope" class="oscilloscope-strip"></canvas>

              </div>

              <!-- sample file input, hidden, kept for JS -->
              <label class="screen-btn file-btn" style="display:none">
                Sample <input id="sample-file" type="file" accept="audio/*" hidden />
              </label>
            </section>

            <!-- RIGHT COLUMN: Channel strip -->
            <aside class="right-col">
              <!-- hidden knob container — keeps JS happy -->
              <div id="right-knobs" style="display:none"></div>
              <!-- Channel strip — 8 rows rendered by app.js -->
              <div class="channel-strip" id="track-selector"></div>
            </aside>

          </div>

          <!-- KEYBOARD PANEL -->
          <div class="kbd-panel">

            <!-- Context zone — changes per page -->
            <div class="kbd-context" id="kbd-context">
              <!-- Rendered by keyboard.js based on current page -->
            </div>

            <div class="kbd-help-strip" id="kbd-help-strip">
              <span id="kbd-help-text"></span>
            </div>

          </div>

          <!-- TRACK STRIP — hidden (replaced by right channel strip) -->
          <div class="track-strip" id="track-strip" style="display:none"></div>

        </main>
      </div>
    </div>
  </div>
  <!-- Studio controls: zoom + add module — must be outside #studio-wrap to avoid overflow:hidden hit-test clipping -->
  <div id="studio-controls">
    <div id="studio-brandmark" aria-label="CONFUstudio">CONFUstudio</div>
    <div class="studio-controls-group studio-controls-group--view">
      <button id="zoom-in" title="Zoom in (Ctrl+scroll)">＋</button>
      <button id="zoom-out" title="Zoom out (Ctrl+scroll)">－</button>
      <span id="zoom-level" style="font-family:monospace;font-size:0.6rem;color:rgba(255,255,255,0.5);padding:0 6px;line-height:36px">100%</span>
      <button id="auto-zoom" title="Auto-fit the studio when the window changes" style="font-size:0.6rem;padding:0 8px">Auto Fit</button>
      <button id="fit-all" title="Fit all modules in view">⊞ Fit</button>
      <button id="toggle-zoom-lens" title="Toggle cursor zoom lens">◉ Lens</button>
    </div>
    <div class="studio-controls-group studio-controls-group--status">
      <span id="module-selection" title="Selected module" style="font-family:monospace;font-size:0.56rem;color:rgba(255,255,255,0.45);padding:0 6px;line-height:36px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">CONFUsynth Instrument</span>
    </div>
    <div class="studio-controls-group studio-controls-group--module">
      <button id="remove-module" title="Remove selected module" disabled style="font-size:0.6rem;padding:0 8px">－ Module</button>
      <button id="add-module" title="Add a new module (synth or mixer)">＋ Module</button>
    </div>
  </div>
  <script type="module" src="/src/app.js"></script>
  <script type="module" src="/src/assistant-client.js"></script>
  <script>
    const isLoopbackHost = ['127.0.0.1', 'localhost', '::1'].includes(window.location.hostname);
    const DEV_SHELL_VERSION = 'confustudio-shell-v6';

    async function resetLocalDevShellState() {
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((reg) => reg.unregister()));
        }
        if (window.caches?.keys) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
      } catch (error) {
        console.warn('[CONFUstudio] Local shell reset failed:', error);
      }
    }

    window.addEventListener('load', () => {
      if (isLoopbackHost) {
        const previous = localStorage.getItem('confusynth-dev-shell-version');
        if (previous !== DEV_SHELL_VERSION) {
          localStorage.setItem('confusynth-dev-shell-version', DEV_SHELL_VERSION);
          resetLocalDevShellState().then(() => {
            window.location.reload();
          });
          return;
        }
        return;
      }

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch((error) => {
          console.warn('[CONFUstudio] Service worker registration failed:', error);
        });
      }
    });
  </script>
</body>
</html>
